name: Build Linux 4.9 (ARM32) Kernel

on:
  workflow_dispatch:

jobs:
  build-kernel:
    runs-on: ubuntu-latest

    # Use Ubuntu 20.04 container for compatibility
    container:
      image: ubuntu:20.04
      
    # Compatibility with Ubuntu 18.04 container
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            bc bison flex build-essential \
            git wget curl ca-certificates \
            libssl-dev libncurses5-dev \
            python

      - name: Fetch prebuilt GCC 4.9 ARM32 cross toolchain
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9 \
            /opt/toolchain

      - name: Set up toolchain environment
        run: |
          echo "Adding ARM32 cross toolchain to PATH"
          echo "/opt/toolchain/bin" >> $GITHUB_PATH

      - name: Derive MTK_PLATFORM from .config
        id: mtk
        shell: bash
        run: |
          set -euo pipefail
          test -f .config

          # Handles either CONFIG_MTK_PLATFORM="mt6761" or CONFIG_MTK_PLATFORM=mt6761
          MTK_PLATFORM="$(sed -n 's/^CONFIG_MTK_PLATFORM="\{0,1\}\([^"]*\)"\{0,1\}$/\1/p' .config | head -n1)"

          if [ -z "$MTK_PLATFORM" ]; then
            echo "CONFIG_MTK_PLATFORM not found in .config"
            exit 1
          fi

          echo "MTK_PLATFORM=$MTK_PLATFORM"
          echo "mtk_platform=$MTK_PLATFORM" >> "$GITHUB_OUTPUT"

      - name: Verify cross compiler is ARM32
        run: |
          arm-linux-androideabi-gcc -dumpmachine
          arm-linux-androideabi-gcc -dM -E - < /dev/null \
            | egrep '__arm__|__aarch64__|__SIZEOF_POINTER__' || true

      - name: Build kernel
        run: |
          export ARCH=arm
          export CROSS_COMPILE=arm-linux-androideabi-
          make -j"$(nproc)" zImage modules MTK_PLATFORM="${{ steps.mtk.outputs.mtk_platform }}"

      - name: Collect built artifacts
        run: |
          mkdir -p artifacts
          cp arch/arm/boot/zImage artifacts/ || true
          cp -r modules artifacts/modules/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-4.9-arm-build
          path: artifacts
